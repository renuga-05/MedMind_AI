<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MedMind AI - Profile</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

    <div class="logo">

        🏥 MedMind AI

    </div>

    <div class="header-right">

        <button class="notification-btn">🔔</button>

        <button id="logoutBtn">Logout</button>

    </div>

</header>

<!-- ================= MAIN ================= -->

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>Dashboard</h2>

        <ul>

    <li onclick="window.location.href='dashboard.html'">
        🏠 Home
    </li>

    <li class="active">
        👤 Profile
    </li>

    <li onclick="window.location.href='appointment.html'">
        📅 Book Appointment
    </li>

    <li onclick="window.location.href='myappointments.html'">
        📋 My Appointments
    </li>

    <li onclick="window.location.href='medicalrecords.html'">📄 Medical Records</li>

    <li onclick="window.location.href='prescriptions.html'">💊 Prescriptions</li>

    <li onclick="window.location.href='reports.html'">📊 Reports</li>

    <li onclick="window.location.href='settings.html'">⚙️ Settings</li>

</ul>

    </aside>

    <!-- Content -->

    <main class="content">

        <div class="profile-card">

            <h1>My Profile</h1>

            <p class="subtitle">

                View and update your personal information.

            </p>

            <!-- Profile Image -->
            <div style="text-align: center; margin-bottom: 35px;">
                <div class="profile-image" style="cursor: pointer;" onclick="document.getElementById('profilePicInput').click();">
                    <img id="profilePic" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2382c4b5'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Profile">
                </div>
                <div style="margin-top: 10px;">
                    <label for="profilePicInput" style="display: inline-block; background: var(--primary); color: #ffffff; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;">📸 Upload Photo</label>
                    <input type="file" id="profilePicInput" accept="image/*" style="display:none;">
                </div>
            </div>

            <!-- Form -->

            <form id="profileForm">

                <div class="row">

                    <div class="input-group">

                        <label>👤 Full Name</label>

                        <input
                            type="text"
                            id="name"
                        >

                    </div>

                    <div class="input-group">

                        <label>📧 Email</label>

                        <input
                            type="email"
                            id="email"
                            readonly
                        >

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>📞 Phone Number</label>

                        <input
                            type="text"
                            id="phone"
                        >

                    </div>

                    <div class="input-group">

                        <label>🎂 Age</label>

                        <input
                            type="number"
                            id="age"
                        >

                    </div>

                </div>

                <div class="row">

                    <div class="input-group">

                        <label>⚧ Gender</label>

                        <select id="gender">

                            <option>Male</option>

                            <option>Female</option>

                            <option>Other</option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>🩸 Blood Group</label>

                        <select id="blood">

                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                            <option>O+</option>
                            <option>O-</option>

                        </select>

                    </div>

                </div>

                <button type="submit">

                    💾 Save Changes

                </button>

            </form>

        </div>

        <footer class="site-footer">
            <p>MedMind AI &copy; 2026 - Renuga D Final Year Student</p>
        </footer>

    </main>

</div>

<script src="js/profile.js"></script>

</body>

</html>
